<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {% feed_meta %}
  {% if jekyll.environment == 'production' and site.google_analytics %}
    {% include google-analytics.html %}
  {% endif %}
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

  <!-- ========== 保留原有 KaTeX（版本 0.16.9） ========== -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHo0K0o4+/RRE05" crossorigin="anonymous"
      onload="renderMathInElement(document.body, {
          delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
          ]
      });"></script>

  <!-- ========== jQuery（Pseudocode.js 依赖） ========== -->
  <script src="https://code.jquery.com/jquery-3.4.0.min.js" defer></script>

  <!-- ========== Pseudocode.js 本地资源 ========== -->
  <link rel="stylesheet" href="/assets/css/pseudocode.css">
  <script src="/assets/js/pseudocode.js" defer></script>

  <!-- ========== 伪代码渲染脚本（依赖 jQuery） ========== -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 使用 jQuery 查找所有 .language-pseudocode 元素
      $(".language-pseudocode").each(function() {
        var $this = $(this);
        var code = $this.text();
        var parentEl = this.parentElement; // 原生 DOM 元素
        var options = { lineNumber: true };
        pseudocode.render(code, parentEl, options);
        // 移除原始代码块
        $this.remove();
        // 用新的 div 替换父容器（保留其内容，但重置外层）
        var newDiv = document.createElement('div');
        newDiv.innerHTML = parentEl.innerHTML;
        parentEl.replaceWith(newDiv);
      });
    });
  </script>

  <!-- 保留原有自定义脚本 -->
  <script src="{{ "/assets/js/auth-redirect.js" | relative_url }}" defer></script>
  <script src="{{ "/assets/js/theme.js" | relative_url }}" defer></script>

</head>
